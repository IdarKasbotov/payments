#    hibernate:
#      ddl-auto: update    # ??? validate / none / create-drop
#    show-sql: true        # ????? SQL ? ??????? (?? ???????)
#    properties:
#      hibernate:
#        format_sql: true

job:
  count-balances-by-type-and-date:
    cron: "*/30 * * * * *"
