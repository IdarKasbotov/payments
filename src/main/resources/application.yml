logging:
  level:
    root: DEBUG
    com.road.to.payments.service.impl: DEBUG

spring:
  docker:
    compose:
      enabled: true

  liquibase:
    enabled: true
    change-log: classpath:root.changelog.xml
    # local-default: сид-данные (context=local) накатываются локально;
    # в проде задать LIQUIBASE_CONTEXTS=prod, чтобы катить только DDL
    contexts: ${LIQUIBASE_CONTEXTS:local}

  rabbitmq:
    host: localhost
    port: 5672
    username: user
    password: password

  datasource:
    url: jdbc:postgresql://localhost:5433/payments   # URL ??????????? ? ??????????
    username: postgres                               # USER ?? docker-compose
    password: postgres                           # PASSWORD ?? docker-compose
#  jpa:
#    hibernate:
#      ddl-auto: update    # ??? validate / none / create-drop
#    show-sql: true        # ????? SQL ? ??????? (?? ???????)
#    properties:
#      hibernate:
#        format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: payments-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.road.to.payments.model
        spring.json.value.default.type: com.road.to.payments.model.PaymentDto

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    listener:
      ack-mode: record

app:
  kafka:
    payment-topic: payments

job:
  count-balances-by-type-and-date:
    cron: "*/30 * * * * *"
